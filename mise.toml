[vars]
swift_dirs = "TestApps/"

[tasks.build]
description = "Build debug binary (Rust)"
run = "cargo build"

[tasks.dev]
description = "Build debug binary and run"
usage = 'arg "<command>" var=#true help="forepaw subcommand and arguments"'
run = "cargo build && cargo run -- ${usage_command}"

[tasks.test]
description = "Run tests (Rust)"
run = "cargo test"

[tasks.check]
description = "Lint and test"
run = [
    "cargo clippy -- -D warnings",
    "cargo test",
]

[tasks.lint]
description = "Lint (clippy)"
run = "cargo clippy -- -D warnings"

[tasks.lint-strict]
description = "Discover new lints (full pedantic + restriction as warnings, not blocking)"
run = "cargo clippy --all-targets -- -W clippy::pedantic -W clippy::restriction"

[tasks.miri]
description = "Run tests under Miri (UB detection, requires nightly)"
run = "cargo +nightly miri test"

[tasks.audit]
description = "Check dependencies for known vulnerabilities"
run = "cargo audit"

[tasks.machete]
description = "Find unused dependencies"
run = "cargo machete"

[tasks.fmt]
description = "Auto-format (Rust + Swift)"
run = [
    "cargo fmt",
    "xcrun swift-format format -i -r {{vars.swift_dirs}}",
]

[tasks.release-build]
description = "Build release binary (Rust)"
run = "cargo build --release"

[tasks.build-windows]
description = "Cross-compile for Windows (both architectures)"
run = [
    "cargo xwin build --target aarch64-pc-windows-msvc",
    "cargo xwin build --target x86_64-pc-windows-msvc",
]

[tasks.swift-build]
description = "Build Swift test apps"
run = "cd TestApps/ClickTarget && swift build"

[tasks.swift-fmt]
description = "Auto-format Swift test apps"
run = "xcrun swift-format format -i -r {{vars.swift_dirs}}"
