[vars]
swift_dirs = "TestApps/"

[tasks.build]
description = "Build debug binary (Rust)"
run = "cargo build --workspace"

[tasks.dev]
description = "Build debug binary and run"
usage = 'arg "<command>" var=#true help="forepaw subcommand and arguments"'
run = "cargo build --workspace && cargo run --bin forepaw -- ${usage_command}"

[tasks.test]
description = "Run tests (Rust)"
run = "cargo test --workspace"

[tasks.check]
description = "Lint and test"
run = [
    "cargo fmt -- --check",
    "cargo clippy --workspace -- -D warnings",
    "cargo test --workspace",
]

[tasks.lint]
description = "Lint current platform (clippy)"
run = "cargo clippy --workspace -- -D warnings"

[tasks.lint-all]
description = "Lint all platform targets (needs rustup targets installed)"
run = [
    "cargo clippy --workspace --target aarch64-apple-darwin -- -D warnings",
    "cargo clippy --workspace --target x86_64-apple-darwin -- -D warnings",
    "cargo clippy --workspace --target x86_64-pc-windows-msvc -- -D warnings",
    "cargo clippy --workspace --target aarch64-pc-windows-msvc -- -D warnings",
    "cargo clippy --workspace --target aarch64-unknown-linux-musl -- -D warnings",
    "cargo clippy --workspace --target x86_64-unknown-linux-musl -- -D warnings",
]

[tasks.lint-strict]
description = "Discover new lints (full pedantic + restriction as warnings, not blocking)"
run = "cargo clippy --workspace --all-targets -- -W clippy::pedantic -W clippy::restriction"

[tasks.miri]
description = "Run tests under Miri (UB detection, requires nightly)"
run = "cargo +nightly miri test --workspace"

[tasks.audit]
description = "Check dependencies for known vulnerabilities"
run = "cargo audit"

[tasks.machete]
description = "Find unused dependencies"
run = "cargo machete"

[tasks.fmt]
description = "Auto-format (Rust + Swift)"
run = [
    "cargo fmt",
    "xcrun swift-format format -i -r {{vars.swift_dirs}}",
]

[tasks.release-build]
description = "Build release binary (Rust)"
run = "cargo build --release --bin forepaw"

[tasks.build-windows]
description = "Cross-compile for Windows (both architectures)"
run = [
    "cargo xwin build --target aarch64-pc-windows-msvc",
    "cargo xwin build --target x86_64-pc-windows-msvc",
]

[tasks.build-linux]
description = "Cross-compile for Linux (both architectures, musl-static)"
run = [
    "cargo zigbuild --target aarch64-unknown-linux-musl",
    "cargo zigbuild --target x86_64-unknown-linux-musl",
]

[tasks.swift-build]
description = "Build Swift test apps"
run = "cd TestApps/ClickTarget && swift build"

[tasks.swift-fmt]
description = "Auto-format Swift test apps"
run = "xcrun swift-format format -i -r {{vars.swift_dirs}}"
