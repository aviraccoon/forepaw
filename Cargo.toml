[package]
name = "forepaw"
version = "0.3.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
regex = "1"

[target.'cfg(target_os = "macos")'.dependencies]
libc = "0.2"
objc2 = "0.6"
objc2-foundation = "0.3"
objc2-app-kit = { version = "0.3", features = [
    "NSWorkspace",
    "NSRunningApplication",
    "NSScreen",
    "NSImage",
    "NSGraphicsContext",
    "NSBitmapImageRep",
] }
objc2-core-graphics = "0.3"
objc2-core-foundation = "0.3"
objc2-vision = { version = "0.3", features = [
    "VNRecognizeTextRequest",
    "VNRequestHandler",
    "VNObservation",
    "VNTypes",
    "block2",
] }
block2 = "0.6"

[target.'cfg(target_os = "windows")'.dependencies]
image = "0.25"
windows = { version = "0.62", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_Storage_Xps",          # PrintWindow + PRINT_WINDOW_FLAGS
    "Win32_Security",
    "Win32_System_Com",
    "Win32_System_Threading",
    "Win32_System_WinRT",
    "Win32_UI_Accessibility",
    "Win32_UI_HiDpi",
    "Win32_UI_WindowsAndMessaging",
    "Foundation",
    "Graphics_Imaging",
    "Media_Ocr",
] }
windows-future = "0.3"

# Clippy lint configuration.
#
# pedantic is denied as baseline (broadly useful, new lints auto-appear).
# restriction lints are cherry-picked (no blanket category enable).
# Promote individual lints from allow to warn, then warn to deny as cleaned.
# Discover new lints with `mise run lint-strict`.
#
# Test exceptions live in clippy.toml.

[lints.clippy]
pedantic = { level = "deny", priority = -1 }

# -- Allow overrides for pedantic lints not yet clean ---------------------
# Remove lines as code is fixed. The base pedantic denial then takes effect.

cast_possible_truncation   = "allow"  # FFI: i64 counts from AX API
cast_possible_wrap         = "allow"  # FFI: usize -> i64 for CFIndex
cast_precision_loss        = "allow"  # FFI: usize -> f64 for coordinates
cast_sign_loss             = "allow"  # FFI: i64 -> usize for counts

# -- Cherry-picked restriction lints --------------------------------------
# All start as allow. Toggle to warn as code is cleaned up.

# Don't Panic
string_slice              = "allow"
indexing_slicing          = "allow"
unwrap_used               = "allow"
panic                     = "warn"
todo                      = "warn"
unimplemented             = "warn"

# Unsafe / Memory Discipline
undocumented_unsafe_blocks     = "warn"
multiple_unsafe_ops_per_block  = "warn"
unnecessary_safety_doc         = "warn"
unnecessary_safety_comment     = "warn"
mem_forget                     = "warn"

# Tripwires (zero warnings currently)
dbg_macro   = "warn"
let_underscore_must_use   = "warn"
rc_mutex    = "warn"
