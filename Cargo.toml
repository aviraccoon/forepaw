[package]
name = "forepaw"
version = "0.3.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
regex = "1"

[target.'cfg(target_os = "macos")'.dependencies]
libc = "0.2"
objc2 = "0.6"
objc2-foundation = "0.3"
objc2-app-kit = { version = "0.3", features = [
    "NSWorkspace",
    "NSRunningApplication",
    "NSScreen",
    "NSImage",
    "NSGraphicsContext",
    "NSBitmapImageRep",
] }
objc2-core-graphics = "0.3"
objc2-core-foundation = "0.3"
objc2-vision = { version = "0.3", features = [
    "VNRecognizeTextRequest",
    "VNRequestHandler",
    "VNObservation",
    "VNTypes",
    "block2",
] }
block2 = "0.6"

[target.'cfg(target_os = "windows")'.dependencies]
image = "0.25"
windows = { version = "0.62", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_Storage_Xps",          # PrintWindow + PRINT_WINDOW_FLAGS
    "Win32_Security",
    "Win32_System_Com",
    "Win32_System_Threading",
    "Win32_System_WinRT",
    "Win32_UI_Accessibility",
    "Win32_UI_HiDpi",
    "Win32_UI_WindowsAndMessaging",
    "Foundation",
    "Graphics_Imaging",
    "Media_Ocr",
] }
windows-future = "0.3"
