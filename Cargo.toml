[package]
name = "forepaw"
version = "0.3.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
regex = "1"

[target.'cfg(target_os = "macos")'.dependencies]
libc = "0.2"
objc2 = "0.6"
objc2-foundation = "0.3"
objc2-app-kit = { version = "0.3", features = [
    "NSWorkspace",
    "NSRunningApplication",
    "NSScreen",
    "NSImage",
    "NSGraphicsContext",
    "NSBitmapImageRep",
] }
objc2-core-graphics = "0.3"
objc2-core-foundation = "0.3"
objc2-vision = { version = "0.3", features = [
    "VNRecognizeTextRequest",
    "VNRequestHandler",
    "VNObservation",
    "VNTypes",
    "block2",
] }
block2 = "0.6"

[target.'cfg(target_os = "windows")'.dependencies]
image = "0.25"
windows = { version = "0.62", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_Storage_Xps",          # PrintWindow + PRINT_WINDOW_FLAGS
    "Win32_Security",
    "Win32_System_Com",
    "Win32_System_Threading",
    "Win32_System_WinRT",
    "Win32_UI_Accessibility",
    "Win32_UI_HiDpi",
    "Win32_UI_WindowsAndMessaging",
    "Foundation",
    "Graphics_Imaging",
    "Media_Ocr",
] }
windows-future = "0.3"

# Clippy lint configuration.
#
# pedantic is denied as baseline (broadly useful, new lints auto-appear).
# restriction lints are cherry-picked (no blanket category enable).
# Promote individual lints from allow to warn, then warn to deny as cleaned.
# Discover new lints with `mise run lint-strict`.
#
# Test exceptions live in clippy.toml.

[lints.clippy]
pedantic = { level = "deny", priority = -1 }

# -- Allow overrides for pedantic lints not yet clean ---------------------
# Remove lines as code is fixed. The base pedantic denial then takes effect.

cast_possible_truncation   = "allow"  # FFI: i64 counts from AX API
cast_possible_wrap         = "allow"  # FFI: usize -> i64 for CFIndex
cast_precision_loss        = "allow"  # FFI: usize -> f64 for coordinates
cast_sign_loss             = "allow"  # FFI: i64 -> usize for counts
cast_lossless              = "allow"
float_cmp                  = "allow"
must_use_candidate         = "allow"
similar_names              = "allow"
many_single_char_names     = "allow"
struct_excessive_bools     = "allow"
ref_option                 = "allow"
module_name_repetitions    = "allow"
return_self_not_must_use   = "allow"
doc_markdown               = "allow"
missing_errors_doc         = "allow"
missing_panics_doc         = "allow"
ptr_as_ptr                 = "allow"
ptr_cast_constness         = "allow"
borrow_as_ptr              = "allow"
ref_as_ptr                 = "allow"
match_wildcard_for_single_variants = "allow"
single_match_else          = "allow"
self_only_used_in_recursion = "allow"
too_many_lines             = "allow"
unnecessary_wraps          = "allow"
map_unwrap_or              = "allow"
manual_string_new          = "allow"
manual_midpoint            = "allow"
format_push_string         = "allow"
assigning_clones           = "allow"
unseparated_literal_suffix = "allow"
wildcard_imports           = "allow"
unused_self                = "allow"
unused_trait_names         = "allow"

# -- Cherry-picked restriction lints --------------------------------------
# All start as allow. Toggle to warn -> deny as code is cleaned up.

# Don't Panic
string_slice              = "allow"
indexing_slicing          = "allow"
unwrap_used               = "allow"
panic                     = "allow"
todo                      = "allow"
unimplemented             = "allow"

# Don't Fail Silently
let_underscore_must_use   = "allow"
map_err_ignore            = "allow"

# Unsafe / Memory Discipline
undocumented_unsafe_blocks     = "allow"
multiple_unsafe_ops_per_block  = "allow"
unnecessary_safety_doc         = "allow"
unnecessary_safety_comment     = "allow"
mem_forget                     = "allow"

# Lint Suppression Guardrails
allow_attributes                 = "allow"
allow_attributes_without_reason = "allow"

# Tripwires (zero warnings currently)
dbg_macro   = "warn"
rc_mutex    = "warn"
