name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Package
        run: |
          mkdir -p dist
          cp .build/release/forepaw dist/
          cd dist
          tar czf forepaw-darwin-arm64.tar.gz forepaw
          shasum -a 256 forepaw-darwin-arm64.tar.gz > forepaw-darwin-arm64.tar.gz.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/forepaw-darwin-arm64.tar.gz
            dist/forepaw-darwin-arm64.tar.gz.sha256
          generate_release_notes: true
