name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Lint + test
        run: mise run check

      - name: Build release
        run: mise run release-build

      - name: Package
        run: |
          mkdir -p dist
          cp .build/release/forepaw dist/
          cd dist
          tar czf forepaw-darwin-arm64.tar.gz forepaw
          shasum -a 256 forepaw-darwin-arm64.tar.gz > forepaw-darwin-arm64.tar.gz.sha256

      - name: Extract changelog
        id: changelog
        run: |
          # Extract the section for the current tag from CHANGELOG.md
          version="${GITHUB_REF_NAME#v}"
          # Extract codename from the version header (e.g. '"Kinkajou"' from '## v0.3.0 "Kinkajou" (2026-04-06)')
          codename=$(grep "^## v${version//./\\.}" CHANGELOG.md | sed -n 's/.*"\(.*\)".*/\1/p')
          if [ -n "${codename}" ]; then
            echo "title=${GITHUB_REF_NAME} \"${codename}\"" >> "$GITHUB_OUTPUT"
          else
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          # Get everything between this version's header and the next ## header (or EOF)
          awk "/^## v${version//./\\.}/{found=1; next} /^## v/{if(found) exit} found" CHANGELOG.md > dist/release-notes.md
          # Append install instructions
          tag="${GITHUB_REF_NAME}"
          cat >> dist/release-notes.md << INSTALL

          ### Install

          \`\`\`bash
          curl -L https://github.com/aviraccoon/forepaw/releases/download/${tag}/forepaw-darwin-arm64.tar.gz | tar xz
          mv forepaw /usr/local/bin/
          forepaw permissions --request
          \`\`\`

          Requires macOS 14+, Apple Silicon. Needs Accessibility and Screen Recording permissions.
          INSTALL

      - name: Release
        # TODO: upgrade to v3 when released (Node 24 support, see softprops/action-gh-release#654)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.changelog.outputs.title }}
          files: |
            dist/forepaw-darwin-arm64.tar.gz
            dist/forepaw-darwin-arm64.tar.gz.sha256
          body_path: dist/release-notes.md
