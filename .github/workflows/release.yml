name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-macos-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/forepaw dist/
          cd dist
          tar czf forepaw-darwin-arm64.tar.gz forepaw
          shasum -a 256 forepaw-darwin-arm64.tar.gz > forepaw-darwin-arm64.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-artifacts
          path: dist/

  windows:
    runs-on: windows-2025
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $arch = if ($target -eq "x86_64-pc-windows-msvc") { "x86_64" } else { "arm64" }
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path "target/$target/release/forepaw.exe" -DestinationPath "dist/forepaw-windows-$arch.zip"
          (Get-FileHash "dist/forepaw-windows-$arch.zip" -Algorithm SHA256).Hash.ToLower() + "  forepaw-windows-$arch.zip" | Set-Content "dist/forepaw-windows-$arch.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-${{ matrix.target }}-artifacts
          path: dist/

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: experimental-features = nix-command flakes

      - name: Build release
        run: nix develop .# --command cargo zigbuild --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/forepaw dist/
          cd dist
          tar czf forepaw-linux-${{ matrix.arch }}.tar.gz forepaw
          shasum -a 256 forepaw-linux-${{ matrix.arch }}.tar.gz > forepaw-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-${{ matrix.arch }}-artifacts
          path: dist/

  release:
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract changelog
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          codename=$(grep "^## v${version//./\\.}" CHANGELOG.md | sed -n 's/.*"\(.*\)".*/\1/p')
          if [ -n "${codename}" ]; then
            echo "title=${GITHUB_REF_NAME} \"${codename}\"" >> "$GITHUB_OUTPUT"
          else
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          awk "/^## v${version//./\\.}/{found=1; next} /^## v/{if(found) exit} found" CHANGELOG.md > dist/release-notes.md
          cat >> dist/release-notes.md << INSTALL

          ### Install

          **macOS (Apple Silicon)**
          \`\`\`bash
          curl -L https://github.com/aviraccoon/forepaw/releases/download/${GITHUB_REF_NAME}/forepaw-darwin-arm64.tar.gz | tar xz
          mv forepaw /usr/local/bin/
          forepaw permissions --request
          \`\`\`

          Requires macOS 14+, Apple Silicon. Needs Accessibility and Screen Recording permissions.

          **Windows (x86_64)**
          \`\`\`powershell
          curl -LO https://github.com/aviraccoon/forepaw/releases/download/${GITHUB_REF_NAME}/forepaw-windows-x86_64.zip
          Expand-Archive forepaw-windows-x86_64.zip
          mv forepaw.exe ~/bin/
          \`\`\`

          **Windows (ARM64)**
          \`\`\`powershell
          curl -LO https://github.com/aviraccoon/forepaw/releases/download/${GITHUB_REF_NAME}/forepaw-windows-arm64.zip
          Expand-Archive forepaw-windows-arm64.zip
          mv forepaw.exe ~/bin/
          \`\`\`

          **Linux (x86_64)**
          \`\`\`bash
          curl -L https://github.com/aviraccoon/forepaw/releases/download/${GITHUB_REF_NAME}/forepaw-linux-x86_64.tar.gz | tar xz
          mv forepaw /usr/local/bin/
          \`\`\`

          **Linux (ARM64)**
          \`\`\`bash
          curl -L https://github.com/aviraccoon/forepaw/releases/download/${GITHUB_REF_NAME}/forepaw-linux-arm64.tar.gz | tar xz
          mv forepaw /usr/local/bin/
          \`\`\`

          Linux binaries are statically linked (musl) and work on any distribution, including NixOS.
          Windows binaries are cross-compiled from macOS -- no Windows SDK needed on your machine.
          INSTALL

      - name: Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ steps.changelog.outputs.title }}
          files: |
            dist/forepaw-darwin-arm64.tar.gz
            dist/forepaw-darwin-arm64.tar.gz.sha256
            dist/forepaw-linux-x86_64.tar.gz
            dist/forepaw-linux-x86_64.tar.gz.sha256
            dist/forepaw-linux-arm64.tar.gz
            dist/forepaw-linux-arm64.tar.gz.sha256
            dist/forepaw-windows-x86_64.zip
            dist/forepaw-windows-x86_64.zip.sha256
            dist/forepaw-windows-arm64.zip
            dist/forepaw-windows-arm64.zip.sha256
          body_path: dist/release-notes.md
