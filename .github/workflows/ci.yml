name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-macos-

      - name: Lint + test
        run: |
          cargo clippy -- -D warnings
          cargo test

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc,x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-windows-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Check ARM64
        run: cargo check --target aarch64-pc-windows-msvc

      - name: Check x86_64
        run: cargo check --target x86_64-pc-windows-msvc

      - name: Lint x86_64
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings
