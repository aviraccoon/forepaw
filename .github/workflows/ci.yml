name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          components: rustfmt

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-macos-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Check x86_64
        run: cargo check --target x86_64-apple-darwin

      - name: Lint x86_64
        run: cargo clippy --all-targets --target x86_64-apple-darwin --workspace -- -D warnings

      - name: Build release
        run: cargo build --release --bin forepaw

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: forepaw-darwin-arm64-${{ github.sha }}
          path: target/release/forepaw

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-pc-windows-msvc,x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-windows-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Check formatting
        run: cargo fmt --check

      - name: Check ARM64
        run: cargo check --target aarch64-pc-windows-msvc

      - name: Lint ARM64
        run: cargo clippy --all-targets --target aarch64-pc-windows-msvc --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Check x86_64
        run: cargo check --target x86_64-pc-windows-msvc

      - name: Lint x86_64
        run: cargo clippy --all-targets --target x86_64-pc-windows-msvc --workspace -- -D warnings

      - name: Build release
        run: cargo build --release --bin forepaw

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: forepaw-windows-x86_64-${{ github.sha }}
          path: target/release/forepaw.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: experimental-features = nix-command flakes

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-linux-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Check formatting
        run: nix develop .# --command cargo fmt --check

      - name: Check generated AT-SPI roles
        run: diff <(bash res/generate_atspi_roles.sh) crates/forepaw/src/platform/linux/role.rs

      - name: Check musl x86_64
        run: nix develop .# --command cargo check --target x86_64-unknown-linux-musl

      - name: Lint musl x86_64
        run: nix develop .# --command cargo clippy --all-targets --target x86_64-unknown-linux-musl --workspace -- -D warnings

      - name: Check musl aarch64
        run: nix develop .# --command cargo check --target aarch64-unknown-linux-musl

      - name: Lint musl aarch64
        run: nix develop .# --command cargo clippy --all-targets --target aarch64-unknown-linux-musl --workspace -- -D warnings

      - name: Test
        run: nix develop .# --command cargo test --workspace

      - name: Build release
        run: nix develop .# --command cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: forepaw-linux-x86_64-${{ github.sha }}
          path: target/x86_64-unknown-linux-musl/release/forepaw
